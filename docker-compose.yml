version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: talenttrack-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: talenttrack-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/talenttrack
      - JWT_SECRET=talenttrack_super_secret_jwt_key_2024
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
    depends_on:
      - mongodb

volumes:
  mongo_data:
